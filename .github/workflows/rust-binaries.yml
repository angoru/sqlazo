name: Rust

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  BIN_NAME: sqlazo
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Check, lint, and test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --locked --all-features

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-gnu
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: false
          - name: linux-x86_64-musl
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            use_cross: false
            apt_packages: musl-tools
          - name: linux-aarch64-gnu
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            use_cross: true
          - name: linux-aarch64-musl
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive_ext: tar.gz
            use_cross: true
          - name: linux-armv7-gnueabihf
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            archive_ext: tar.gz
            use_cross: true
          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            use_cross: false
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            use_cross: false
          - name: windows-x86_64-msvc
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            exe_ext: .exe
            use_cross: false
          - name: windows-aarch64-msvc
            os: windows-latest
            target: aarch64-pc-windows-msvc
            archive_ext: zip
            exe_ext: .exe
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Rust crate
        shell: bash
        run: |
          if [[ ! -f Cargo.toml ]]; then
            echo "Cargo.toml was not found at the repository root."
            echo "Move this workflow or set working-directory if the Rust crate lives elsewhere."
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install apt packages
        if: matrix.apt_packages
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --release --locked --target "${{ matrix.target }}"
          else
            cargo build --release --locked --target "${{ matrix.target }}"
          fi

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME:-manual}"
          artifact="${BIN_NAME}-${version}-${{ matrix.name }}"
          mkdir -p "dist/${artifact}"

          binary="target/${{ matrix.target }}/release/${BIN_NAME}${{ matrix.exe_ext }}"
          if [[ ! -f "${binary}" ]]; then
            echo "Expected binary not found: ${binary}"
            exit 1
          fi

          cp "${binary}" "dist/${artifact}/"
          cp README.md "dist/${artifact}/" || true
          cp LICENSE "dist/${artifact}/" || true

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            7z a "dist/${artifact}.zip" "./dist/${artifact}/*"
            echo "asset=dist/${artifact}.zip" >> "${GITHUB_OUTPUT}"
          else
            tar -C dist -czf "dist/${artifact}.tar.gz" "${artifact}"
            echo "asset=dist/${artifact}.tar.gz" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.name }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset }}
